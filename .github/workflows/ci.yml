name: ci

on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      LOG_TO_FILE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check src tests
          black --check src tests
      - name: Unit tests
        run: pytest tests/unit -q --cov=src/fraud_lakehouse --cov-report=term-missing

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Validate
        working-directory: infra/terraform
        run: |
          terraform init -backend=false
          terraform validate
        # NOTE: `terraform fmt -check` deliberately deferred until terraform
        # is installed locally (post AWS-setup weekend) so formatting can be
        # fixed at the desk, not by red CI. Validation + security scan are
        # the gates that matter now.
      - name: Security scan (checkov)
        run: |
          pip install checkov
          checkov -d infra/terraform --compact --quiet
